name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  backend-build:
    name: Backend — Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.build.json
        working-directory: apps/backend

  frontend-build:
    name: Frontend — Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
        working-directory: apps/frontend
      - run: npm run build
        working-directory: apps/frontend

  jest-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campuslink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campuslink_test
      JWT_SECRET: ci_test_secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Run backend unit tests
        working-directory: apps/backend
        run: npm test -- --passWithNoTests
      - name: Run frontend unit tests
        working-directory: apps/frontend
        run: npm test -- --passWithNoTests

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campuslink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campuslink_test
      JWT_SECRET: ci_test_secret
      NODE_ENV: test
      FRONTEND_URL: http://localhost:5173
      PORT: 3000
      E2E_RUN_ID: ${{ github.run_id }}
      API_URL: http://localhost:3000/api
      BASE_URL: http://localhost:5173
      VITE_API_URL: http://localhost:3000/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
        working-directory: apps/frontend
      - name: Start backend
        run: npm run start:dev --workspace=apps/backend &
      - name: Wait for backend
        run: npx wait-on http://localhost:3000/api --timeout 60000
      - name: Start frontend
        run: npm run dev --workspace=apps/frontend &
      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 60000
      - name: Run E2E tests
        working-directory: apps/frontend
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 14

  notify:
    name: Notificar Discord
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, jest-tests, e2e]
    if: always()
    steps:
      - name: Resultado del pipeline
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          title: "CampusLink CI"
          description: "Rama `${{ github.ref_name }}` · Ejecutado por **${{ github.actor }}**"
          username: "GitHub Actions"
